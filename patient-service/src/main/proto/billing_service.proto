syntax = "proto3";

//esto es para que las clases se generen en archivos separados (los request, responses, etc)
option java_multiple_files = true;

option java_package = "billing";

service BillingService {
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}

message  BillingRequest {
    string patientId = 1;
    string name = 2;
    string email = 3;
}

message BillingResponse {
    string accountId = 1;
    string status = 2;
}

//compilar este archivo antes de crear el BillingGrpcService.java en el paquete grpc
